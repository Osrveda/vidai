<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Videos — VidAI</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#040808;--border:rgba(34,197,94,.1);--border2:rgba(34,197,94,.22);--text:#f0fff4;--muted:#3d5c45;--muted2:#7abf8a;--p:#16a34a;--p2:#22c55e;--p3:rgba(34,197,94,.18);--b:#1d4ed8;--b2:#60a5fa;--r:12px;--r2:20px;}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:rgba(34,197,94,.5);border-radius:2px}
.orb{position:fixed;border-radius:50%;filter:blur(150px);pointer-events:none;z-index:0}
.orb1{width:700px;height:700px;background:radial-gradient(circle,rgba(34,197,94,.1),transparent 70%);top:-200px;left:-200px}
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(4,8,4,.88);backdrop-filter:blur(40px);border-bottom:1px solid var(--border);padding:0 32px}
.nav-in{max-width:1200px;margin:0 auto;height:64px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text);font-weight:900;font-size:20px;letter-spacing:-.04em}
.logo-mark svg{width:28px;height:28px}
.grad{background:linear-gradient(135deg,#22d3ee,#e879f9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-links{display:flex;gap:12px;align-items:center}
.nav-links a{color:#7abf8a;text-decoration:none;font-size:13px;font-weight:600;transition:color .2s}
.nav-links a:hover{color:#f0fff4}
.cr-pill{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);color:#22c55e;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700}
.main{max-width:1200px;margin:0 auto;padding:96px 32px 60px;position:relative;z-index:2}
h1{font-size:clamp(26px,3vw,36px);font-weight:900;letter-spacing:-.03em;margin-bottom:6px}
.sub{color:#7abf8a;font-size:14px;margin-bottom:32px}
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px;align-items:center}
.filter-btn{background:rgba(255,255,255,.03);border:1px solid var(--border);color:#7abf8a;padding:8px 18px;border-radius:100px;font-size:13px;font-weight:600;cursor:pointer;font-family:Sora,sans-serif;transition:all .2s}
.filter-btn:hover,.filter-btn.active{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.4);color:#22c55e}
.search-box{flex:1;max-width:280px;background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:100px;padding:8px 18px;color:#f0fff4;font-size:13px;font-family:Sora,sans-serif;outline:none;transition:border-color .2s}
.search-box:focus{border-color:rgba(34,197,94,.4)}
.search-box::placeholder{color:#3d5c45}
.stats-row{display:flex;gap:20px;margin-bottom:28px;flex-wrap:wrap}
.stat-chip{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:var(--r);padding:14px 20px;display:flex;gap:12px;align-items:center}
.stat-chip .sv{font-size:22px;font-weight:900;background:linear-gradient(135deg,#22c55e,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-chip .sl{font-size:11px;color:#7abf8a;text-transform:uppercase;letter-spacing:1.5px;font-weight:700}
.videos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
.vid-card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;transition:all .3s}
.vid-card:hover{border-color:var(--border2);transform:translateY(-4px);box-shadow:0 20px 60px rgba(0,0,0,.5)}
.vid-thumb{aspect-ratio:16/9;background:linear-gradient(135deg,#0a1628,#1a0a28);position:relative;overflow:hidden;cursor:pointer}
.vid-thumb video{width:100%;height:100%;object-fit:cover;display:block}
.vid-thumb .play-ov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3);opacity:0;transition:opacity .3s;font-size:40px}
.vid-card:hover .play-ov{opacity:1}
.vid-status{position:absolute;top:10px;right:10px;padding:4px 10px;border-radius:100px;font-size:10px;font-weight:700}
.status-done{background:rgba(34,197,94,.2);border:1px solid rgba(34,197,94,.4);color:#22c55e}
.status-proc{background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.3);color:#fbbf24}
.vid-info{padding:16px}
.vid-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.vid-tool-badge{font-size:10px;font-weight:700;color:#22c55e;background:rgba(34,197,94,.1);padding:3px 10px;border-radius:100px;text-transform:uppercase;letter-spacing:1px}
.vid-qual{font-size:10px;color:#7abf8a}
.vid-prompt{font-size:13px;color:#f0fff4;line-height:1.5;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.vid-footer{display:flex;gap:8px;align-items:center;justify-content:space-between}
.vid-date{font-size:11px;color:#3d5c45}
.vid-actions{display:flex;gap:6px}
.btn-dl{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.25);color:#22c55e;padding:6px 14px;border-radius:8px;font-size:11px;font-weight:700;text-decoration:none;transition:all .2s;cursor:pointer;font-family:Sora,sans-serif}
.btn-dl:hover{background:rgba(34,197,94,.22)}
.btn-del{background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.2);color:#f87171;padding:6px 12px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:Sora,sans-serif;transition:all .2s}
.btn-del:hover{background:rgba(248,113,113,.15)}
.empty-state{text-align:center;padding:80px 20px;color:#7abf8a}
.empty-state .ei{font-size:56px;margin-bottom:20px}
.empty-state h3{font-size:22px;font-weight:800;color:#f0fff4;margin-bottom:10px}
.empty-state p{font-size:14px;margin-bottom:24px}
.btn-prim{background:linear-gradient(135deg,#16a34a,#1d4ed8);border:none;color:#fff;padding:14px 32px;border-radius:12px;cursor:pointer;font-size:15px;font-weight:700;font-family:Sora,sans-serif;text-decoration:none;display:inline-block}
.pagination{display:flex;gap:8px;justify-content:center;margin-top:36px;flex-wrap:wrap}
.page-btn{background:rgba(255,255,255,.04);border:1px solid var(--border);color:#7abf8a;width:40px;height:40px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:Sora,sans-serif;transition:all .2s;display:flex;align-items:center;justify-content:center}
.page-btn:hover,.page-btn.active{background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.4);color:#22c55e}
.loading{text-align:center;padding:60px;color:#7abf8a}
@media(max-width:768px){.main{padding:80px 16px 40px}.videos-grid{grid-template-columns:1fr 1fr}.stats-row{gap:10px}}
@media(max-width:480px){.videos-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="orb orb1"></div>

<nav>
  <div class="nav-in">
    <a class="logo" href="index.html">
      <div class="logo-mark"><svg viewBox="0 0 30 30" fill="none"><polygon points="15,2 27,9 27,21 15,28 3,21 3,9" fill="url(#lg)"/><defs><linearGradient id="lg" x1="3" y1="3" x2="27" y2="27"><stop offset="0%" stop-color="#22d3ee"/><stop offset="50%" stop-color="#e879f9"/><stop offset="100%" stop-color="#818cf8"/></linearGradient></defs></svg></div>
      Vid<span class="grad">AI</span>
    </a>
    <div class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="refer.html">Refer & Earn</a>
      <span class="cr-pill" id="crDisplay">— cr</span>
    </div>
  </div>
</nav>

<main class="main">
  <div id="authGate" style="display:none;text-align:center;padding:100px 20px">
    <div style="font-size:48px;margin-bottom:16px">🔒</div>
    <h2 style="font-size:24px;font-weight:800;margin-bottom:10px">Login Required</h2>
    <a href="index.html" class="btn-prim">Homepage Pe Jao</a>
  </div>

  <div id="historyContent" style="display:none">
    <h1>My <span class="grad">Videos</span></h1>
    <p class="sub">Saari banaayi huyi videos — download, share, delete</p>

    <div class="stats-row">
      <div class="stat-chip"><div class="sv" id="totalCount">0</div><div class="sl">Total Videos</div></div>
      <div class="stat-chip"><div class="sv" id="totalCredits">0</div><div class="sl">Credits Used</div></div>
      <div class="stat-chip"><div class="sv" id="thisMonth">0</div><div class="sl">This Month</div></div>
    </div>

    <div class="filters">
      <input type="text" class="search-box" placeholder="🔍 Prompt search..." oninput="filterVideos()" id="searchInput">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('ttv',this)">Text to Video</button>
      <button class="filter-btn" onclick="setFilter('itv',this)">Image to Video</button>
      <button class="filter-btn" onclick="setFilter('ls',this)">Lip Sync</button>
      <button class="filter-btn" onclick="setFilter('fs',this)">Face Swap</button>
    </div>

    <div id="videoGrid"><div class="loading">Videos load ho rahe hain...</div></div>
    <div id="pagination" class="pagination"></div>
  </div>
</main>

<script>
const SUPABASE_URL='https://higufnzhndyvuvnextqt.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpZ3VmbnpobmR5dnV2bmV4dHF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NDEzNDksImV4cCI6MjA5MTAxNzM0OX0.KjUPLjGUDl7ifC1Og1IRFB49-7TK4-iirBAt4SOUJns';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let currentUser=null, allVideos=[], activeFilter='all', currentPage=1;
const PER_PAGE=12;
const toolNames={ttv:'Text to Video',itv:'Image to Video',stv:'Script to Video',pa:'Photo Animate',tp:'Talking Photo',vtv:'Video to Video',fs:'Face Swap',ls:'Lip Sync',ac:'Avatar Create',ta:'Talking Avatar',dg:'Dance Generator',se:'Sound Effects',br:'Background Remove',aie:'AI Enhance',cap:'Auto Captions',stt:'Style Transfer'};
const qualNames={free:'Free',good:'Good',pro:'Pro',premium:'Premium'};

async function init(){
  const{data:{session}}=await sb.auth.getSession();
  if(!session){document.getElementById('authGate').style.display='block';return;}
  currentUser=session.user;
  document.getElementById('historyContent').style.display='block';
  const{data:profile}=await sb.from('profiles').select('credits').eq('id',currentUser.id).single();
  if(profile) document.getElementById('crDisplay').textContent=profile.credits+' cr';
  loadVideos();
}

async function loadVideos(){
  const{data:videos}=await sb.from('video_history').select('*').eq('user_id',currentUser.id).order('created_at',{ascending:false});
  allVideos=videos||[];
  updateStats();
  renderVideos();
}

function updateStats(){
  document.getElementById('totalCount').textContent=allVideos.length;
  const totalCr=allVideos.reduce((a,v)=>a+(v.credits_used||0),0);
  document.getElementById('totalCredits').textContent=totalCr.toLocaleString();
  const now=new Date(), thisM=allVideos.filter(v=>{const d=new Date(v.created_at);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}).length;
  document.getElementById('thisMonth').textContent=thisM;
}

function setFilter(f,btn){
  activeFilter=f; currentPage=1;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderVideos();
}

function filterVideos(){ currentPage=1; renderVideos(); }

function getFiltered(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  return allVideos.filter(v=>{
    const matchTool=activeFilter==='all'||v.tool_used===activeFilter;
    const matchSearch=!q||v.prompt?.toLowerCase().includes(q);
    return matchTool&&matchSearch;
  });
}

function renderVideos(){
  const filtered=getFiltered();
  const total=filtered.length;
  const pages=Math.ceil(total/PER_PAGE);
  const slice=filtered.slice((currentPage-1)*PER_PAGE, currentPage*PER_PAGE);
  const grid=document.getElementById('videoGrid');

  if(!total){
    grid.innerHTML=`<div class="empty-state"><div class="ei">🎬</div><h3>${activeFilter==='all'?'Koi Video Nahi':'Koi Result Nahi'}</h3><p>${activeFilter==='all'?'Abhi tak koi video nahi bani. Chalo banate hain!':'Filter change karke dekho'}</p>${activeFilter==='all'?'<a href="index.html" class="btn-prim">Generate Video →</a>':''}</div>`;
    document.getElementById('pagination').innerHTML='';
    return;
  }

  grid.innerHTML=`<div class="videos-grid">${slice.map(v=>{
    const isUrl=v.video_url?.startsWith('http');
    const date=v.created_at?new Date(v.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'short'}):'—';
    return `<div class="vid-card">
      <div class="vid-thumb" onclick="${isUrl?`window.open('${v.video_url}','_blank')`:''}">
        ${isUrl?`<video src="${v.video_url}" muted loop onmouseenter="this.play()" onmouseleave="this.pause()"></video><div class="play-ov">▶️</div><span class="vid-status status-done">✓ Ready</span>`:`<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:36px">⏳</div><span class="vid-status status-proc">Processing</span>`}
      </div>
      <div class="vid-info">
        <div class="vid-header">
          <span class="vid-tool-badge">${toolNames[v.tool_used]||v.tool_used||'Video'}</span>
          <span class="vid-qual">${qualNames[v.quality]||v.quality||''}</span>
        </div>
        <div class="vid-prompt">${v.prompt||'—'}</div>
        <div class="vid-footer">
          <span class="vid-date">${date} · ${v.credits_used||'—'} cr</span>
          <div class="vid-actions">
            ${isUrl?`<a href="${v.video_url}" download="vidai-video.mp4" class="btn-dl">⬇️</a>`:''}
            <button class="btn-del" onclick="deleteVideo('${v.id}',this)">🗑</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('')}</div>`;

  // Pagination
  if(pages>1){
    let pHtml='';
    if(currentPage>1) pHtml+=`<button class="page-btn" onclick="goPage(${currentPage-1})">←</button>`;
    for(let i=1;i<=pages;i++) pHtml+=`<button class="page-btn${i===currentPage?' active':''}" onclick="goPage(${i})">${i}</button>`;
    if(currentPage<pages) pHtml+=`<button class="page-btn" onclick="goPage(${currentPage+1})">→</button>`;
    document.getElementById('pagination').innerHTML=pHtml;
  } else { document.getElementById('pagination').innerHTML=''; }
}

function goPage(p){ currentPage=p; renderVideos(); window.scrollTo({top:0,behavior:'smooth'}); }

async function deleteVideo(id,btn){
  if(!confirm('Ye video delete karo?')) return;
  btn.textContent='...'; btn.disabled=true;
  await sb.from('video_history').delete().eq('id',id);
  allVideos=allVideos.filter(v=>v.id!==id);
  updateStats(); renderVideos();
}

init();
</script>
</body>
</html>
