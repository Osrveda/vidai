<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VidAI — India's #1 AI Video Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
--bg:#040808;--bg2:#060d0d;--bg3:#060d0d;
--glass:rgba(34,197,94,.03);--glass2:rgba(34,197,94,.06);
--border:rgba(34,197,94,.1);--border2:rgba(34,197,94,.22);
--text:#f0fff4;--muted:#3d5c45;--muted2:#7abf8a;
--p:#16a34a;--p2:#22c55e;--p3:rgba(34,197,94,.18);
--b:#1d4ed8;--b2:#60a5fa;
--og:#0d9488;--og2:#2dd4bf;
--teal:#0d9488;--teal2:#2dd4bf;
--green:#059669;--green2:#22c55e;
--ease:cubic-bezier(0.22,1,0.36,1);
--ease2:cubic-bezier(0.16,1,0.3,1);
--r:12px;--r2:20px;--r3:28px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;overflow-x:hidden;max-width:100vw}
body{background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;overflow-x:hidden;cursor:none;max-width:100vw;width:100%}
::-webkit-scrollbar{width:2px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:rgba(34,197,94,.5);border-radius:2px}
#cur{position:fixed;width:8px;height:8px;background:var(--p2);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);mix-blend-mode:screen;transition:width .12s,height .12s,background .2s}
#curR{position:fixed;width:32px;height:32px;border:1.5px solid rgba(167,139,250,.35);border-radius:50%;pointer-events:none;z-index:99998;transform:translate(-50%,-50%);transition:width .28s var(--ease),height .28s var(--ease),border-color .25s}
body.cursor-hover #cur{width:14px;height:14px;background:var(--p2)}
body.cursor-hover #curR{width:44px;height:44px;border-color:rgba(232,121,249,.6)}
.orb{position:fixed;border-radius:50%;filter:blur(150px);pointer-events:none;z-index:0}
.orb1{width:900px;height:900px;background:radial-gradient(circle,rgba(34,197,94,.16),transparent 70%);top:-350px;left:-250px;animation:orbd 26s ease-in-out infinite}
.orb2{width:750px;height:750px;background:radial-gradient(circle,rgba(29,78,216,.1),transparent 70%);bottom:-200px;right:-180px;animation:orbd 33s ease-in-out infinite reverse}
.orb3{width:600px;height:600px;background:radial-gradient(circle,rgba(34,197,94,.09),transparent 70%);top:45%;left:55%;animation:orbd 22s ease-in-out infinite 6s}
@keyframes orbd{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(60px,-50px) scale(1.07)}66%{transform:translate(-40px,55px) scale(.93)}}
.noise{position:fixed;inset:0;z-index:1;opacity:.018;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:180px;pointer-events:none}
#pCanvas{position:fixed;inset:0;z-index:1;pointer-events:none}
.grad{background:linear-gradient(135deg,var(--p2) 0%,var(--b2) 45%,var(--p2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.grad-fire{background:linear-gradient(135deg,var(--og2),var(--p2),var(--p2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.grad-ice{background:linear-gradient(135deg,var(--teal2),var(--b2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.outline-t{-webkit-text-stroke:2px rgba(255,255,255,.45);-webkit-text-fill-color:transparent}
.reveal{opacity:0;transform:translateY(36px);transition:opacity .9s var(--ease),transform .9s var(--ease)}
.reveal.in{opacity:1;transform:none}
.reveal-left{opacity:0;transform:translateX(-50px);transition:opacity .9s var(--ease),transform .9s var(--ease)}
.reveal-left.in{opacity:1;transform:none}
.reveal-right{opacity:0;transform:translateX(50px);transition:opacity .9s var(--ease),transform .9s var(--ease)}
.reveal-right.in{opacity:1;transform:none}
.d1{transition-delay:.08s}.d2{transition-delay:.18s}.d3{transition-delay:.3s}.d4{transition-delay:.42s}.d5{transition-delay:.55s}
.nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:0 52px;transition:all .4s}
.nav.scrolled{background:rgba(4,4,8,.88);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-bottom:1px solid var(--border)}
.nav-in{max-width:1360px;margin:0 auto;height:72px;display:flex;align-items:center;gap:52px}
.logo{display:flex;align-items:center;gap:11px;font-family:'Sora',sans-serif;font-weight:900;font-size:22px;text-decoration:none;color:var(--text);letter-spacing:-.04em}
.logo-mark{width:32px;height:32px;flex-shrink:0}
.logo-mark svg{width:100%;height:100%}
.nav-links{display:flex;gap:36px;flex:1}
.nav-links a{color:var(--muted2);text-decoration:none;font-size:14px;font-weight:600;transition:color .2s;letter-spacing:.01em}
.nav-links a:hover{color:var(--text)}
.nav-r{display:flex;gap:10px;margin-left:auto;align-items:center}
.n-ghost{background:none;border:1px solid var(--border2);color:var(--text);padding:8px 22px;border-radius:10px;cursor:none;font-size:14px;font-weight:600;font-family:'Sora',sans-serif;transition:all .22s}
.n-ghost:hover{border-color:var(--p2);color:var(--p2)}
.n-cta{background:linear-gradient(135deg,var(--p),var(--b));border:none;color:#fff;padding:9px 26px;border-radius:10px;cursor:none;font-size:14px;font-weight:700;font-family:'Sora',sans-serif;box-shadow:0 0 30px rgba(34,197,94,.32);transition:all .25s;letter-spacing:.02em}
.n-cta:hover{box-shadow:0 0 52px rgba(34,197,94,.58);transform:translateY(-1px)}
.tool-drop-wrap{position:relative;margin-bottom:14px}
.tool-drop-btn{width:100%;background:rgba(0,0,0,.45);border:1px solid rgba(34,197,94,.22);border-radius:10px;padding:13px 16px;color:#fff;font-size:14px;font-family:'Sora',sans-serif;cursor:pointer;display:flex;align-items:center;gap:10px;transition:border-color .25s}
.tool-drop-btn:hover{border-color:rgba(34,197,94,.5)}
.tool-drop-menu{position:absolute;top:calc(100% + 6px);left:0;right:0;background:#080f08;border:1px solid rgba(34,197,94,.22);border-radius:12px;padding:6px;z-index:500;display:none;max-height:320px;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.7)}
.tool-drop-menu.open{display:block}
.tdi-group{padding:8px 12px 4px;font-size:10px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:2px}
.tdi{padding:10px 14px;border-radius:8px;font-size:13px;color:var(--muted2);cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:all .15s}
.tdi:hover{background:rgba(34,197,94,.1);color:var(--text)}
.tdi-cr{font-size:11px;font-weight:700;color:var(--p2);background:rgba(34,197,94,.1);padding:2px 8px;border-radius:20px}
.gen-grid{display:grid;grid-template-columns:1fr 1fr;gap:36px;align-items:start}
.gen-preview-col{display:flex;flex-direction:column;gap:0}
.gen-preview-box{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:var(--r2);aspect-ratio:16/9;position:relative;overflow:hidden}
.gen-stat-box{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:var(--r);padding:16px;text-align:center}
.gen-stat-num{font-family:'Sora',sans-serif;font-size:24px;font-weight:900;background:linear-gradient(135deg,var(--p2),var(--b2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.gen-stat-lbl{font-size:10px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:2px}
@media(max-width:768px){
body{cursor:auto}
#cur,#curR{display:none}
#pCanvas{display:none}
.orb1,.orb2,.orb3{display:none}
.nav{padding:0 16px}
.nav-in{gap:0;height:60px}
.nav-links{display:none}
.logo{font-size:18px}
.nav-r{gap:6px}
.n-ghost{padding:6px 12px;font-size:12px}
.n-cta{padding:7px 14px;font-size:12px}
.hero{grid-template-columns:1fr!important;padding:80px 16px 40px;gap:32px;min-height:auto}
.hero-r{display:none}
.hero-h{font-size:36px!important}
.hero-sub{font-size:15px;max-width:100%}
.hero-stats{gap:16px}
.hnum{font-size:22px}
.hero-btns{flex-direction:column}
.btn-primary,.btn-outline{width:100%;text-align:center;justify-content:center}
.sec{padding:52px 16px}
.sec-h{font-size:clamp(26px,7vw,44px)!important}
.gen-grid{grid-template-columns:1fr!important;gap:20px}
.gen-preview-col{display:none}
.gen-panel{padding:20px}
.gen-opts{flex-direction:column;gap:14px}
.gpills{flex-wrap:wrap;gap:6px}
.gpill{padding:8px 12px;font-size:12px}
.pg{grid-template-columns:1fr!important;gap:14px;padding:0}
.pc.ph{transform:none!important}
.tools-grid,.masonry{grid-template-columns:1fr 1fr!important}
.tc{min-width:unset}
.modal{padding:24px 18px;margin:12px;border-radius:18px}
.cat-strip{gap:6px;padding:0 16px;flex-wrap:nowrap;overflow-x:auto}
.cat-pill{padding:6px 12px;font-size:11px;white-space:nowrap}
.why-grid{grid-template-columns:1fr!important}
.comp-wrap{overflow-x:auto}
.cmp-tbl{font-size:11px;min-width:600px}
.ppv-grid{grid-template-columns:1fr!important}
.hero-vid-frame{max-width:280px}
.sec-vid-bg{display:none}
.nav-auth-btns{gap:6px}
.user-credits{display:none}
}
.user-menu{position:relative;display:none}
.user-menu.active{display:flex;align-items:center;gap:8px}
.user-avatar{width:34px;height:34px;border-radius:50%;border:2px solid var(--p2);object-fit:cover;cursor:pointer}
.user-avatar-placeholder{width:34px;height:34px;border-radius:50%;border:2px solid var(--p2);background:var(--p3);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--p2);cursor:pointer}
.user-credits{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);color:var(--p2);padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer}
.buy-popup{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:9999;display:none;align-items:center;justify-content:center}
.buy-popup.open{display:flex}
.buy-box{background:#060d0d;border:1px solid rgba(34,197,94,.3);border-radius:24px;padding:36px;max-width:480px;width:90%;position:relative}
.buy-pkg{background:rgba(34,197,94,.05);border:1px solid rgba(34,197,94,.15);border-radius:14px;padding:18px 20px;cursor:pointer;transition:all .25s;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.buy-pkg:hover,.buy-pkg.popular{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.4)}
.buy-pkg-cr{font-size:22px;font-weight:900;color:var(--p2);font-family:Sora,sans-serif}
.buy-pkg-pr{font-size:15px;font-weight:700;color:var(--text)}
.buy-pkg-badge{background:linear-gradient(135deg,var(--p),var(--b));color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:100px}
.user-dropdown{position:absolute;top:44px;right:0;background:#0a1a0a;border:1px solid var(--border2);border-radius:14px;padding:8px;min-width:180px;box-shadow:0 20px 60px rgba(0,0,0,.6);display:none;z-index:1001}
.user-menu:hover .user-dropdown{display:block}
.user-dropdown a{display:block;padding:10px 14px;color:var(--muted2);text-decoration:none;font-size:13px;border-radius:8px;transition:all .2s}
.user-dropdown a:hover{background:var(--glass2);color:var(--text)}
.user-dropdown hr{border:none;border-top:1px solid var(--border);margin:6px 0}
.nav-auth-btns{display:flex;gap:10px}
.hero{position:relative;z-index:2;min-height:100vh;display:grid;grid-template-columns:1fr 1fr;align-items:center;max-width:1360px;margin:0 auto;padding:120px 52px 80px;gap:80px}
.badge{display:inline-flex;align-items:center;gap:8px;background:rgba(34,197,94,.09);border:1px solid rgba(34,197,94,.26);color:var(--p2);padding:7px 18px;border-radius:100px;font-size:11px;font-weight:700;margin-bottom:30px;letter-spacing:.08em;text-transform:uppercase}
.bdot{width:6px;height:6px;background:var(--p2);border-radius:50%;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(1.7)}}
.hero-h{font-family:'Sora',sans-serif;font-size:clamp(52px,5.5vw,88px);font-weight:900;line-height:.97;margin-bottom:22px;letter-spacing:-.045em}
.hero-sub{color:var(--muted2);font-size:17px;margin-bottom:40px;line-height:1.68;max-width:490px;font-weight:400}
.hero-sub b{color:var(--p2);font-weight:700}
.hero-btns{display:flex;gap:14px;margin-bottom:56px;flex-wrap:wrap}
.btn-primary{background:linear-gradient(135deg,var(--p),var(--b));border:none;color:#fff;padding:16px 36px;border-radius:13px;cursor:none;font-size:16px;font-weight:700;font-family:'Sora',sans-serif;box-shadow:0 8px 48px rgba(34,197,94,.4);transition:all .32s var(--ease);letter-spacing:.02em;position:relative;overflow:hidden}
.btn-primary::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);opacity:0;transition:opacity .25s}
.btn-primary:hover{box-shadow:0 12px 64px rgba(34,197,94,.64);transform:translateY(-2px) scale(1.02)}
.btn-primary:hover::after{opacity:1}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text);padding:16px 30px;border-radius:13px;cursor:none;font-size:16px;font-weight:600;font-family:'Sora',sans-serif;transition:all .28s;display:flex;align-items:center;gap:10px}
.btn-outline:hover{border-color:rgba(34,197,94,.5);background:rgba(34,197,94,.07);color:var(--p2)}
.hero-stats{display:flex;gap:34px;flex-wrap:wrap}
.hstat{display:flex;flex-direction:column;gap:4px}
.hnum{font-family:'Sora',sans-serif;font-size:32px;font-weight:900;background:linear-gradient(135deg,var(--p2),var(--b2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.hlbl{font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:2.5px;font-weight:700}
.hsep{width:1px;height:36px;background:linear-gradient(to bottom,transparent,var(--border2),transparent);margin:auto 0}
.hero-r{position:relative;display:flex;justify-content:center}
.hero-vid-frame{position:relative;border-radius:24px;overflow:hidden;border:1px solid rgba(34,197,94,.3);box-shadow:0 0 0 1px rgba(34,197,94,.08),0 48px 120px rgba(0,0,0,.7),0 0 90px rgba(34,197,94,.15);aspect-ratio:9/14;max-width:420px;width:100%}
.hero-vid-frame video{width:100%;height:100%;object-fit:cover;display:block}
.hero-vid-frame::before{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(4,4,8,.95) 0%,rgba(4,4,8,.15) 35%,transparent 60%);z-index:1;pointer-events:none}
.hero-vid-caption{position:absolute;bottom:22px;left:22px;right:22px;z-index:2}
.hvc-tag{font-size:10px;color:var(--p2);font-weight:700;text-transform:uppercase;letter-spacing:2.5px;margin-bottom:7px}
.hvc-text{font-family:'Sora',sans-serif;font-size:18px;font-weight:800;line-height:1.25;letter-spacing:-.02em}
.hero-bar{position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--p),var(--b),var(--p));transform-origin:left;animation:progbar 7s linear infinite;z-index:3}
@keyframes progbar{0%{transform:scaleX(0)}100%{transform:scaleX(1)}}
.fbadge{position:absolute;background:rgba(6,6,16,.88);backdrop-filter:blur(18px);border:1px solid var(--border2);border-radius:12px;padding:10px 16px;font-size:12px;font-weight:600;animation:flt 4s ease-in-out infinite;z-index:4;white-space:nowrap}
@keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
.fb1{top:18px;right:-20px;animation-delay:0s;border-color:rgba(34,197,94,.35);color:var(--p2)}
.fb2{top:42%;left:-28px;animation-delay:1.6s;border-color:rgba(29,78,216,.35);color:var(--b2)}
.fb3{bottom:100px;right:-22px;animation-delay:3s;border-color:rgba(34,197,94,.35);color:var(--p2)}
.scroll-line{width:1px;height:48px;background:linear-gradient(to bottom,rgba(34,197,94,.9),transparent);animation:scrollline 2.2s ease-in-out infinite}
@keyframes scrollline{0%{transform:scaleY(0);transform-origin:top;opacity:1}50%{transform:scaleY(1);transform-origin:top}51%{transform-origin:bottom}100%{transform:scaleY(0);transform-origin:bottom;opacity:0}}
.scroll-text{font-size:9px;letter-spacing:4px;text-transform:uppercase;font-weight:700;color:var(--muted)}
.marquee-wrap{position:relative;z-index:2;overflow:hidden;border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:18px 0;background:rgba(255,255,255,.014)}
.marquee-track{display:flex;gap:0;animation:marquee 28s linear infinite;width:max-content}
.marquee-track:hover{animation-play-state:paused}
.m-item{display:flex;align-items:center;gap:30px;padding:0 30px;font-size:13px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.1em;white-space:nowrap;flex-shrink:0}
.m-item span{color:var(--p2);font-size:18px}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.sec{max-width:1360px;margin:0 auto;padding:130px 52px;position:relative;z-index:2}
.sec-label{font-size:10px;font-weight:700;letter-spacing:5px;color:var(--p2);text-transform:uppercase;margin-bottom:16px;opacity:.9}
.sec-h{font-family:'Sora',sans-serif;font-size:clamp(34px,4vw,58px);font-weight:900;margin-bottom:64px;line-height:1.02;letter-spacing:-.04em}
.zone-purple{background:radial-gradient(ellipse 100% 70% at 20% 50%,rgba(34,197,94,.07) 0%,transparent 70%)}
.zone-blue{background:radial-gradient(ellipse 100% 70% at 80% 50%,rgba(29,78,216,.07) 0%,transparent 70%)}
.zone-pink{background:radial-gradient(ellipse 100% 70% at 50% 50%,rgba(34,197,94,.07) 0%,transparent 70%)}
.zone-teal{background:radial-gradient(ellipse 100% 70% at 20% 50%,rgba(13,148,136,.06) 0%,transparent 70%)}
.cine-banner{position:relative;z-index:2;width:100%;height:600px;overflow:hidden}
.cine-banner video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.cine-banner .cb-overlay{position:absolute;inset:0;z-index:1}
.cb-overlay-purple{background:linear-gradient(105deg,rgba(4,4,8,.97) 0%,rgba(4,4,8,.85) 35%,rgba(4,4,8,.5) 60%,rgba(4,4,8,.2) 100%)}
.cb-overlay-blue{background:linear-gradient(255deg,rgba(4,4,8,.97) 0%,rgba(4,4,8,.85) 35%,rgba(4,4,8,.5) 60%,rgba(4,4,8,.2) 100%)}
.cb-overlay-pink{background:linear-gradient(105deg,rgba(4,4,8,.97) 0%,rgba(4,4,8,.85) 38%,rgba(4,4,8,.4) 65%,rgba(4,4,8,.15) 100%)}
.cb-color-purple{background:radial-gradient(ellipse 60% 100% at 0% 50%,rgba(34,197,94,.22) 0%,transparent 70%);position:absolute;inset:0;z-index:2;pointer-events:none}
.cb-color-blue{background:radial-gradient(ellipse 60% 100% at 100% 50%,rgba(29,78,216,.2) 0%,transparent 70%);position:absolute;inset:0;z-index:2;pointer-events:none}
.cb-color-pink{background:radial-gradient(ellipse 60% 100% at 0% 50%,rgba(34,197,94,.18) 0%,transparent 70%);position:absolute;inset:0;z-index:2;pointer-events:none}
.cb-content{position:absolute;inset:0;z-index:3;display:flex;align-items:center;padding:0 52px;max-width:860px}
.cb-content.right{margin-left:auto;max-width:860px;justify-content:flex-end;text-align:right}
.cb-inner{max-width:620px}
.cb-content.right .cb-inner{text-align:right}
.cb-tag{font-size:10px;font-weight:700;letter-spacing:5px;text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:10px}
.cb-content.right .cb-tag{justify-content:flex-end}
.cb-tag-dot{width:7px;height:7px;border-radius:50%;animation:pulse 2s infinite}
.cb-tag-purple{color:var(--p2)}.cb-tag-purple .cb-tag-dot{background:var(--p2)}
